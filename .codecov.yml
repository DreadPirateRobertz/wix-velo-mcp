# Codecov configuration for wix-velo-mcp
# Docs: https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  unit:
    paths:
      - src/
    carryforward: true

ignore:
  - "tests/"
  - "dist/"
  - "*.config.ts"
  - "*.config.js"
